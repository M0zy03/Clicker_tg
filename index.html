<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  margin: 0;
  background: #000;
  background-size: cover;
  background-position: center;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial;
  overflow: hidden;
  transition: background 0.5s;
}

#game {
  text-align: center;
}

#score {
  font-size: 50px;
  margin-bottom: 20px;
  transition: transform 0.1s;
  color: black; /* черный цвет */
}

#clicker {
  width: 220px;
  height: 220px;
  border-radius: 20px;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
  -webkit-user-drag: none;
}

#effects {
  position: fixed;
  top: 0;
  left: 0;
  pointer-events: none;
}

.plus {
  position: absolute;
  font-size: 28px;
  font-weight: bold;
  animation: floatUp 0.6s ease-out forwards;
}

@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-50px) scale(1.5); }
}

/* ОГРОМНОЕ 67 */
#bigEvent {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.5);
  font-size: 600px; /* стало больше */
  font-weight: bold;
  color: gold;
  opacity: 0;
  pointer-events: none;
  text-shadow: 2px 2px 10px #000;
}

.show67 {
  animation: show67 3s ease-out; /* стало дольше */
}

@keyframes show67 {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
  30% { opacity: 1; transform: translate(-50%, -50%) scale(1.3); }
  70% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
  100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
}

.show67 {
  animation: show67 1s ease-out;
}

@keyframes show67 {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
  50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
  100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
}
</style>
</head>

<body>

<div id="game">
  <div id="score">0</div>
  <img id="clicker" src="Image_1.jpg" draggable="false">
</div>

<div id="effects"></div>
<div id="bigEvent">67</div>

<!-- звук клика -->
<audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

<!-- звук ачивки (можешь заменить) -->
<audio id="achSound" src="https://github.com/M0zy03/Clicker_tg/raw/refs/heads/main/six_seven.mp3"></audio>

<script>
let score = 0;
let lastBgIndex = -1;

const scoreEl = document.getElementById("score");
const effects = document.getElementById("effects");
const clickSound = document.getElementById("clickSound");
const achSound = document.getElementById("achSound");
const bigEvent = document.getElementById("bigEvent");

// ТВОИ ФОНЫ
const backgrounds = [
  "bg1.jpg",
  "bg2.jpg",
  "bg3.jpg",
  "bg4.jpg",
  "bg5.jpg",
  "bg6.jpg",
  "bg7.jpg",
  "bg8.jpg",
  "bg9.jpg",
  "bg10.jpg",
  "bg11.jpg",
  "bg12.jpg",
  "bg13.jpg",
  "bg14.jpg",
  "bg15.jpg"
];

function updateBackground() {
  let index = Math.floor(score / 100);

  if (index !== lastBgIndex && index < backgrounds.length) {
    document.body.style.backgroundImage = `url(${backgrounds[index]})`;
    lastBgIndex = index;
  }
}

function check67() {
  if (score % 100 === 67) {
    bigEvent.classList.remove("show67");
    void bigEvent.offsetWidth; // перезапуск анимации
    bigEvent.classList.add("show67");

    achSound.currentTime = 0;
    achSound.play();

    if (navigator.vibrate) {
      navigator.vibrate(3000); // вибрация на 3 секунды
    }

    if (Telegram.WebApp.HapticFeedback) {
      Telegram.WebApp.HapticFeedback.impactOccurred("heavy");
    }
  }
}

function createPlus(x, y) {
  const el = document.createElement("div");
  el.className = "plus";
  el.innerText = "+1";
  el.style.left = x + "px";
  el.style.top = y + "px";

  effects.appendChild(el);
  setTimeout(() => el.remove(), 600);
}

document.getElementById("clicker").addEventListener("click", (e) => {
  score++;
  scoreEl.innerText = score;

  scoreEl.style.transform = "scale(1.2)";
  setTimeout(() => scoreEl.style.transform = "scale(1)", 80);

  createPlus(e.clientX, e.clientY);

  clickSound.currentTime = 0;
  clickSound.play();

  updateBackground();
  check67();
});

Telegram.WebApp.expand();
</script>

</body>
</html>
