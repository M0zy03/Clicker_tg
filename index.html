<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #1a1a1a, #000);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial;
  overflow: hidden;
}

#game {
  text-align: center;
}

#score {
  font-size: 50px;
  margin-bottom: 20px;
  transition: transform 0.1s;
}

/* картинка */
#clicker {
  width: 220px;
  height: 220px;
  border-radius: 20px;
  cursor: pointer;

  /* ОТКЛЮЧАЕМ ВЫДЕЛЕНИЕ */
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;

  /* ОТКЛЮЧАЕМ ПЕРЕТАСКИВАНИЕ */
  pointer-events: auto;
  -webkit-user-drag: none;

  transition: transform 0.08s ease, filter 0.15s;
}

/* нажатие */
#clicker:active {
  transform: scale(0.85);
  filter: brightness(1.4);
}

/* контейнер для +1 */
#effects {
  position: fixed;
  top: 0;
  left: 0;
  pointer-events: none;
}

/* +1 */
.plus {
  position: absolute;
  color: #00ffcc;
  font-size: 28px;
  font-weight: bold;
  animation: floatUp 0.6s ease-out forwards;
}

@keyframes floatUp {
  0% {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
  100% {
    opacity: 0;
    transform: translateY(-50px) scale(1.5);
  }
}
</style>
</head>

<body>

<div id="game">
  <div id="score">0</div>
  <img id="clicker" src="Image_1.jpg" draggable="false">
</div>

<div id="effects"></div>

<script>
let score = 0;
const scoreEl = document.getElementById("score");
const effects = document.getElementById("effects");

// ПУЛ объектов (чтобы не лагало)
const pool = [];

function createPlus(x, y) {
  let el;

  if (pool.length > 0) {
    el = pool.pop();
  } else {
    el = document.createElement("div");
    el.className = "plus";
    effects.appendChild(el);
  }

  el.innerText = "+1";
  el.style.left = x + "px";
  el.style.top = y + "px";

  el.style.animation = "none";
  el.offsetHeight; // перезапуск анимации
  el.style.animation = "floatUp 0.6s ease-out forwards";

  setTimeout(() => {
    pool.push(el);
  }, 600);
}

document.getElementById("clicker").addEventListener("click", (e) => {
  score++;
  scoreEl.innerText = score;

  // анимация счёта
  scoreEl.style.transform = "scale(1.15)";
  setTimeout(() => {
    scoreEl.style.transform = "scale(1)";
  }, 80);

  createPlus(e.clientX, e.clientY);

  // вибрация в Telegram
  if (Telegram.WebApp.HapticFeedback) {
    Telegram.WebApp.HapticFeedback.impactOccurred("light");
  }
});

Telegram.WebApp.expand();
</script>

</body>
</html>
