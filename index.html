<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #1a1a1a, #000);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial;
}

#game {
  text-align: center;
}

#score {
  font-size: 50px;
  margin-bottom: 20px;
  transition: transform 0.2s;
}

/* картинка-кнопка */
#clicker {
  width: 200px;
  height: 200px;
  border-radius: 20px;
  cursor: pointer;
  transition: transform 0.1s ease, filter 0.2s;
}

/* эффект нажатия */
#clicker:active {
  transform: scale(0.9);
  filter: brightness(1.3);
}

/* всплывающий +1 */
.plus {
  position: absolute;
  color: #00ffcc;
  font-size: 30px;
  animation: floatUp 0.8s ease-out forwards;
}

@keyframes floatUp {
  0% {
    opacity: 1;
    transform: translateY(0);
  }
  100% {
    opacity: 0;
    transform: translateY(-60px);
  }
}
</style>
</head>

<body>

<div id="game">
  <div id="score">0</div>

  <!-- ЗАМЕНИ src НА СВОЮ КАРТИНКУ -->
  <img id="clicker" src="Image_1.jpg" onclick="addPoint(event)">
</div>

<script>
let score = 0;

function addPoint(e) {
  score++;
  const scoreEl = document.getElementById("score");
  scoreEl.innerText = score;

  // анимация увеличения счёта
  scoreEl.style.transform = "scale(1.2)";
  setTimeout(() => {
    scoreEl.style.transform = "scale(1)";
  }, 100);

  // создаём +1
  const plus = document.createElement("div");
  plus.innerText = "+1";
  plus.className = "plus";

  plus.style.left = e.clientX + "px";
  plus.style.top = e.clientY + "px";

  document.body.appendChild(plus);

  setTimeout(() => {
    plus.remove();
  }, 800);
}

Telegram.WebApp.expand();
</script>

</body>
</html>
