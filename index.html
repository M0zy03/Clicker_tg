<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #1a1a1a, #000);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial;
  overflow: hidden;
}

#game {
  text-align: center;
}

#score {
  font-size: 50px;
  margin-bottom: 20px;
  transition: transform 0.1s;
}

/* картинка */
#clicker {
  width: 220px;
  height: 220px;
  border-radius: 20px;
  cursor: pointer;

  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
  -webkit-user-drag: none;

  transition: transform 0.08s ease, filter 0.15s;
}

#clicker:active {
  transform: scale(0.85);
  filter: brightness(1.4);
}

/* слой эффектов */
#effects {
  position: fixed;
  top: 0;
  left: 0;
  pointer-events: none;
}

/* +1 */
.plus {
  position: absolute;
  color: #00ffcc;
  font-size: 28px;
  font-weight: bold;
  animation: floatUp 0.6s ease-out forwards;
}

@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-50px) scale(1.5); }
}

/* частицы */
.particle {
  position: absolute;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: orange;
  pointer-events: none;
  animation: explode 0.6s ease-out forwards;
}

@keyframes explode {
  0% {
    opacity: 1;
    transform: translate(0,0) scale(1);
  }
  100% {
    opacity: 0;
    transform: translate(var(--x), var(--y)) scale(0.5);
  }
}
</style>
</head>

<body>

<div id="game">
  <div id="score">0</div>
  <img id="clicker" src="Image_1.jpg" draggable="false">
</div>

<div id="effects"></div>

<script>
let score = 0;
const scoreEl = document.getElementById("score");
const effects = document.getElementById("effects");

function createPlus(x, y) {
  const el = document.createElement("div");
  el.className = "plus";
  el.innerText = "+1";
  el.style.left = x + "px";
  el.style.top = y + "px";

  effects.appendChild(el);
  setTimeout(() => el.remove(), 600);
}

function createExplosion(x, y) {
  for (let i = 0; i < 12; i++) {
    const p = document.createElement("div");
    p.className = "particle";

    const angle = Math.random() * 2 * Math.PI;
    const distance = Math.random() * 60 + 20;

    const dx = Math.cos(angle) * distance + "px";
    const dy = Math.sin(angle) * distance + "px";

    p.style.left = x + "px";
    p.style.top = y + "px";
    p.style.setProperty("--x", dx);
    p.style.setProperty("--y", dy);

    effects.appendChild(p);

    setTimeout(() => p.remove(), 600);
  }
}

document.getElementById("clicker").addEventListener("click", (e) => {
  score++;
  scoreEl.innerText = score;

  // анимация счёта
  scoreEl.style.transform = "scale(1.15)";
  setTimeout(() => {
    scoreEl.style.transform = "scale(1)";
  }, 80);

  createPlus(e.clientX, e.clientY);
  createExplosion(e.clientX, e.clientY);

  if (Telegram.WebApp.HapticFeedback) {
    Telegram.WebApp.HapticFeedback.impactOccurred("medium");
  }
});

Telegram.WebApp.expand();
</script>

</body>
</html>
