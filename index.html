<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #1a1a1a, #000);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial;
  overflow: hidden;
  transition: background 0.5s;
}

.shake {
  animation: shake 0.3s;
}

@keyframes shake {
  0% { transform: translate(0,0); }
  25% { transform: translate(5px,-5px); }
  50% { transform: translate(-5px,5px); }
  75% { transform: translate(5px,5px); }
  100% { transform: translate(0,0); }
}

#game {
  text-align: center;
}

#score {
  font-size: 50px;
  margin-bottom: 20px;
  transition: transform 0.1s;
}

#clicker {
  width: 220px;
  height: 220px;
  border-radius: 20px;
  cursor: pointer;

  user-select: none;
  -webkit-user-select: none;
  -webkit-user-drag: none;

  transition: transform 0.08s ease, filter 0.15s;
}

#clicker:active {
  transform: scale(0.85);
  filter: brightness(1.4);
}

#effects {
  position: fixed;
  top: 0;
  left: 0;
  pointer-events: none;
}

.plus {
  position: absolute;
  font-size: 28px;
  font-weight: bold;
  animation: floatUp 0.6s ease-out forwards;
}

@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-50px) scale(1.5); }
}

.particle {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  background: radial-gradient(circle, #ffcc00, #ff3300);
  animation: explode 0.7s ease-out forwards;
}

@keyframes explode {
  0% { opacity: 1; transform: translate(0,0) scale(1); }
  100% { opacity: 0; transform: translate(var(--x), var(--y)) scale(0.5); }
}
</style>
</head>

<body>

<div id="game">
  <div id="score">0</div>
  <img id="clicker" src="Image_1.jpg" draggable="false">
</div>

<div id="effects"></div>

<!-- звук -->
<audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

<script>
let score = 0;
const scoreEl = document.getElementById("score");
const effects = document.getElementById("effects");
const sound = document.getElementById("clickSound");

function createPlus(x, y, isCrit=false) {
  const el = document.createElement("div");
  el.className = "plus";
  el.innerText = isCrit ? "CRIT!" : "+1";
  el.style.color = isCrit ? "#ff0000" : "#00ffcc";

  el.style.left = x + "px";
  el.style.top = y + "px";

  effects.appendChild(el);
  setTimeout(() => el.remove(), 600);
}

function createExplosion(x, y, power=40) {
  const screenW = window.innerWidth;
  const screenH = window.innerHeight;

  for (let i = 0; i < power; i++) {
    const p = document.createElement("div");
    p.className = "particle";

    const targetX = Math.random() * screenW;
    const targetY = Math.random() * screenH;

    const dx = targetX - x + "px";
    const dy = targetY - y + "px";

    p.style.left = x + "px";
    p.style.top = y + "px";

    p.style.setProperty("--x", dx);
    p.style.setProperty("--y", dy);

    const size = Math.random() * 8 + 4;
    p.style.width = size + "px";
    p.style.height = size + "px";

    effects.appendChild(p);
    setTimeout(() => p.remove(), 700);
  }
}

function screenShake() {
  document.body.classList.add("shake");
  setTimeout(() => document.body.classList.remove("shake"), 300);
}

function updateBackground() {
  if (score > 100) {
    document.body.style.background = "radial-gradient(circle, #001f3f, #000)";
  }
  if (score > 300) {
    document.body.style.background = "radial-gradient(circle, #3f001f, #000)";
  }
  if (score > 600) {
    document.body.style.background = "radial-gradient(circle, #003f1f, #000)";
  }
}

document.getElementById("clicker").addEventListener("click", (e) => {

  let isCrit = Math.random() < 0.15; // 15% шанс крита
  let add = isCrit ? 5 : 1;

  score += add;
  scoreEl.innerText = score;

  scoreEl.style.transform = "scale(1.2)";
  setTimeout(() => scoreEl.style.transform = "scale(1)", 80);

  createPlus(e.clientX, e.clientY, isCrit);
  createExplosion(e.clientX, e.clientY, isCrit ? 80 : 40);

  if (isCrit) screenShake();

  // звук
  sound.currentTime = 0;
  sound.play();

  updateBackground();

  if (Telegram.WebApp.HapticFeedback) {
    Telegram.WebApp.HapticFeedback.impactOccurred(isCrit ? "heavy" : "light");
  }
});

Telegram.WebApp.expand();
</script>

</body>
</html>
